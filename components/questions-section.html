<!-- Questions & Announcement Editor Section -->
<section class="questions-section">
    <div class="question-box">
        <h3>❓ Have you confirmed changes to your mandate or address?</h3>
        <button class="btn-action">Questions for discussion</button>
    </div>
    
    <div class="question-box">
        <h3>📋 Select this questionnaire</h3>
        <p>What small steps have helped you feel more confident today?</p>
    </div>
    
    <!-- Announcement Editor (CEO only) -->
    <div class="question-box ceo-only-field announcement-editor" style="margin-top:16px;">
        <h3>📣 Write Announcement (CEO only)</h3>
        <textarea id="announcementText" rows="3" style="width:100%;" placeholder="Type your announcement..."></textarea>
        <div style="margin-top:8px; display:flex; gap:8px;">
            <button id="publishAnnouncementBtn" class="btn-action">Publish</button>
            <button id="saveDraftAnnouncementBtn" class="btn-secondary">Save Draft</button>
        </div>
    </div>
</section>
